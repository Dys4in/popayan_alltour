{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PopayanAllTour - CiroGoal</title>
    <style>
        /* Reset CSS */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Estilos del Nav */
        /* Navbar */
        .navbar {
            position: absolute;
            top: 0;
            width: 100%;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: transparent;
            transition: top 0.3s ease;
            z-index: 1000;
        }

        .navbar.scrolled {
            background-color: #000000d8;
            color: #fff;
        }

        .logo-nav img {
            height: 70px;
            width: auto;
        }

        .nav-menu {
            display: flex;
            gap: 30px;
            list-style: none;
        }

        .nav-menu li a {
            color: white;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            position: relative;
            transition: color 0.3s ease;
        }

        .nav-menu li a::after {
            content: "";
            position: absolute;
            bottom: -5px;
            left: 0;
            height: 2px;
            width: 100%;
            background-color: #ffffff;
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s;
        }

        .nav-menu li a:hover {
            color: #ffffff;
        }

        .nav-menu li a:hover::after {
            transform: scaleX(1);
        }

        .nav-icons {
            display: flex;
            gap: 15px;
        }

        .nav-icon i {
            font-size: 24px;
            color: white;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .hamburger {
            display: none;
            cursor: pointer;
            font-size: 32px;
            color: white;
            z-index: 1100;
        }

        html,
        body {
            width: 100%;
            height: 100%;
        }

        body {
            line-height: 1;
            font-family: 'Archivo Black';
            background-image: url("{% static 'assets/background_page.png' %}");
            background-size: cover;
            background-position: center;
        }

        ol,
        ul {
            list-style: none;
        }

        img,
        video {
            max-width: 100%;
            height: auto;
            display: block;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .hero-container {
            margin-bottom: 10em;
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Aboreto&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="icon" href="{% static 'assets/favicon.png' %}">
</head>

<body>

    <div class="hero-container">
        <nav class="navbar" id="navbar">
            <a href="#" class="logo-nav">
                <img src="{% static 'img/home/logo.png' %}" alt="Popayán Tour Logo">
            </a>
            <ul class="nav-menu" id="nav-menu">
                <li><a href="{% url 'home' %}">Inicio</a></li>
                <li><a href="{% url 'semanaSanta' %}">Semana santa</a></li>
                <li><a href="{% url 'listar_hoteles' %}">Sitios de interés</a></li>
                <li><a href="{% url 'historia_1537' %}">Historia</a></li>
                <li><a href="{% url 'entretenimiento' %}">Entretenimiento</a></li>
            </ul>
            <div class="nav-actions">
                <div class="nav-icons">
                    {% if request.user.is_authenticated and request.user.is_staff %}
                    <a href="{% url 'perfilUser' %}" class="nav-icon"><i class="fas fa-user"></i></a>
                    {% else %}
                    <a href=""></a>
                    {% endif %}
                </div>
                <div class="hamburger" id="hamburger">
                    <i class="fas fa-bars"></i>
                </div>
            </div>
        </nav>
    </div>


    <div id="game-container"></div>
    <script>
        window.urlEntretenimiento = "{% url 'entretenimiento' %}";
    </script>

    <script src="{% static 'js/phaser.js' %}"></script>
    <script type="module" src="{% static 'js/src/main.js' %}"></script>
</body>

</html>
